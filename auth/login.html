
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExperienceMe</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="../landing.html" class="logo">ExperienceMe</a> <!--if user presses ExperienceMe directed to landing.html -->
            <div class="nav-links">
                <a href="../landing.html#features">Features</a> <!--if user presses Features directed to landing.html -->
                <a href="../landing.html#about">About</a> <!--if user presses About directed to landing.html -->
                <a href="register.html">Don't have an account?</a> <!--if user presses "dont have an account" directed to register.html -->
            </div>
        </div>
    </nav>

    <!-- Login Form Section -->
    <section class="section">
        <div class="form-container">
            <div class="form-card">
                <h1 style="text-align: center; margin-bottom: 0.5rem; color: var(--primary-color);">Welcome Back</h1>
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">
                    Sign in to continue your adventure
                </p>

                <!-- Alert Messages -->
                <div id="alertContainer"></div> <!-- This is here to say if log in was successful, originally put in for error handling but found it useful for actual platform -->

                <!-- Login Form -->
                <form id="loginForm">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="you@example.com"
                            required
                        >
                    </div>
                    <!-- Password input -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                     <!-- Remember me checkbox, so no nedd to re type in, basic login functionality from websites like Gera dovana, Tinggly -->
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" id="rememberMe">
                            <span style="color: var(--text-secondary); font-size: 0.875rem;">Remember me</span>
                        </label>
                        <!-- Forgot password button again just like gera dovana and tinggly except nothing happens when you press it  -->
                        <a href="#" style="color: var(--primary-color); text-decoration: none; font-size: 0.875rem;">
                            Forgot password?
                        </a>
                    </div>
                     <!-- submit button  -->
                    <button type="submit" class="btn btn-primary" style="width: 100%;" id="submitBtn">
                        Sign In
                    </button>
                </form>
                    <!-- Dont have an account button the hrefs to register.html page -->
                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
                    Don't have an account?
                    <a href="register.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">
                        Sign up
                    </a>
                </p>
            </div>
        </div>
    </section>

    <!-- Footer same on all pages, got to keep my rights -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2025 ExperienceMe. All rights reserved.</p>
        </div>
    </footer>

    <!-- Supabase Connect Delivery Network (CDN) basicaly my toolkit for supabase functions -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase Client which connects to my supabase project supabaseClient.js has my supabase url and api key -->
    <script src="../lib/supabaseClient.js"></script>
    <!-- Login Script this loads logic  -->
    <script src="login.js"></script>
</body>
</html>
